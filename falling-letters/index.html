<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Falling Letters</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100dvh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    #ui {
      width: 100%;
      max-width: 440px;
      padding: 7px 16px;
      display: flex;
      justify-content: space-between;
      color: #eee;
      font-size: 0.9rem;
      height: 36px;
      flex-shrink: 0;
    }
    #ui span strong { color: #e94560; }

    /* Canvas gets all space between UI and grid */
    #canvas-container {
      width: 100%;
      max-width: 440px;
      height: calc(100dvh - 36px - 172px);
      flex-shrink: 0;
      overflow: hidden;
    }

    /* Grid: fixed 172px, scrolls if rows overflow */
    #sound-grid {
      width: 100%;
      max-width: 440px;
      padding: 5px 8px 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-content: flex-start;
      height: 172px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sound-btn {
      background: #0f3460;
      color: #dde;
      border: 2px solid #1a4a80;
      border-radius: 7px;
      padding: 5px 0;
      /* 6 per row */
      width: calc(16.66% - 5px);
      min-width: 42px;
      font-size: 0.78rem;
      font-family: inherit;
      cursor: pointer;
      touch-action: manipulation;
      transition: background .1s, border-color .1s;
    }
    .sound-btn:active { opacity: 0.7; }
    .sound-btn.hit {
      background: #1a5c3a;
      border-color: #2ecc71;
      color: #2ecc71;
    }
    .sound-btn.miss {
      background: #5c1a1a;
      border-color: #e74c3c;
      color: #e74c3c;
    }

    #game-over {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,26,46,0.95);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      color: #eee;
      text-align: center;
    }
    #game-over.show { display: flex; }
    #game-over h2 { font-size: 2rem; color: #e94560; }
    #game-over p { color: #aaa; }
    #game-over button {
      background: #e94560; color: white; border: none;
      padding: 14px 36px; font-size: 1rem; border-radius: 8px; cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="ui">
    <span>Score: <strong id="score">0</strong></span>
    <span>Lives: <strong id="lives">❤️❤️❤️</strong></span>
    <span>Level: <strong id="level">1</strong></span>
  </div>

  <div id="canvas-container"></div>
  <div id="sound-grid"></div>

  <div id="game-over">
    <h2>Game Over</h2>
    <p id="go-score"></p>
    <button onclick="restartGame()">Play again</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script>
  // Russian alphabet order — buttons appear in this order
  const LETTERS = [
    { letter: "А", sound: "a" },    { letter: "Б", sound: "b" },
    { letter: "В", sound: "v" },    { letter: "Г", sound: "g" },
    { letter: "Д", sound: "d" },    { letter: "Е", sound: "ye" },
    { letter: "Ё", sound: "yo" },   { letter: "Ж", sound: "zh" },
    { letter: "З", sound: "z" },    { letter: "И", sound: "ee" },
    { letter: "Й", sound: "y" },    { letter: "К", sound: "k" },
    { letter: "Л", sound: "l" },    { letter: "М", sound: "m" },
    { letter: "Н", sound: "n" },    { letter: "О", sound: "o" },
    { letter: "П", sound: "p" },    { letter: "Р", sound: "r" },
    { letter: "С", sound: "s" },    { letter: "Т", sound: "t" },
    { letter: "У", sound: "oo" },   { letter: "Ф", sound: "f" },
    { letter: "Х", sound: "kh" },   { letter: "Ц", sound: "ts" },
    { letter: "Ч", sound: "ch" },   { letter: "Ш", sound: "sh" },
    { letter: "Щ", sound: "shch" }, { letter: "Ъ", sound: "ъ" },
    { letter: "Ы", sound: "ih" },   { letter: "Ь", sound: "ь" },
    { letter: "Э", sound: "e" },    { letter: "Ю", sound: "yu" },
    { letter: "Я", sound: "ya" },
  ];

  let fallingLetters = [];
  let score = 0;
  let lives = 3;
  let level = 1;
  let frameCount = 0;
  let gameActive = true;

  // Build buttons in Russian alphabet order (no sort)
  const grid = document.getElementById('sound-grid');
  LETTERS.forEach(({ sound }) => {
    const btn = document.createElement('button');
    btn.className = 'sound-btn';
    btn.textContent = sound;
    btn.addEventListener('click', () => handleTap(sound, btn));
    grid.appendChild(btn);
  });

  function handleTap(sound, btn) {
    if (!gameActive) return;
    let lowestIdx = -1, lowestY = -Infinity;
    for (let i = 0; i < fallingLetters.length; i++) {
      if (fallingLetters[i].sound === sound && fallingLetters[i].y > lowestY) {
        lowestY = fallingLetters[i].y;
        lowestIdx = i;
      }
    }
    const hit = lowestIdx >= 0;
    if (hit) {
      fallingLetters[lowestIdx].flash = 20;
      const removed = fallingLetters[lowestIdx];
      setTimeout(() => {
        const idx = fallingLetters.indexOf(removed);
        if (idx >= 0) fallingLetters.splice(idx, 1);
      }, 200);
      score++;
      document.getElementById('score').textContent = score;
    }
    btn.classList.add(hit ? 'hit' : 'miss');
    setTimeout(() => btn.classList.remove('hit', 'miss'), 300);
  }

  function spawnInterval() { return Math.max(55, 120 - level * 8); }
  function fallSpeed() { return 0.6 + level * 0.25; }

  function spawnLetter(p) {
    const data = LETTERS[Math.floor(Math.random() * LETTERS.length)];
    fallingLetters.push({
      letter: data.letter, sound: data.sound,
      x: 32 + Math.random() * (p.width - 64),
      y: -30, speed: fallSpeed(), flash: 0,
    });
  }

  new p5(function(p) {
    p.setup = function() {
      const container = document.getElementById('canvas-container');
      const w = container.clientWidth || Math.min(window.innerWidth, 440);
      const h = container.clientHeight || Math.max(150, window.innerHeight - 36 - 172);
      const cnv = p.createCanvas(w, h);
      cnv.parent('canvas-container');
      p.textAlign(p.CENTER, p.CENTER);
      p.noStroke();
    };

    p.draw = function() {
      if (!gameActive) return;
      p.background(26, 26, 46);
      frameCount++;
      if (frameCount % spawnInterval() === 0) spawnLetter(p);

      for (let i = fallingLetters.length - 1; i >= 0; i--) {
        const fl = fallingLetters[i];
        fl.y += fl.speed;

        if (fl.flash > 0) {
          p.fill(46, 204, 113, fl.flash * 8);
          p.ellipse(fl.x, fl.y, 66, 66);
          fl.flash -= 4;
        }

        p.fill(fl.flash > 0 ? p.color(46, 204, 113) : p.color(255));
        p.textSize(48);
        p.text(fl.letter, fl.x, fl.y);

        if (fl.y > p.height + 30) {
          fallingLetters.splice(i, 1);
          loseLife();
        }
      }

      const newLevel = Math.floor(score / 10) + 1;
      if (newLevel !== level) {
        level = newLevel;
        document.getElementById('level').textContent = level;
      }
    };
  });

  function loseLife() {
    lives--;
    document.getElementById('lives').textContent =
      '❤️'.repeat(Math.max(lives, 0)) + '🖤'.repeat(Math.max(3 - lives, 0)) || '💔';
    if (lives <= 0) endGame();
  }

  function endGame() {
    gameActive = false;
    document.getElementById('go-score').textContent =
      `You scored ${score} point${score !== 1 ? 's' : ''}`;
    document.getElementById('game-over').classList.add('show');
  }

  function restartGame() {
    fallingLetters = [];
    score = 0; lives = 3; level = 1; frameCount = 0; gameActive = true;
    document.getElementById('score').textContent = 0;
    document.getElementById('lives').textContent = '❤️❤️❤️';
    document.getElementById('level').textContent = 1;
    document.getElementById('game-over').classList.remove('show');
  }
  </script>
</body>
</html>
