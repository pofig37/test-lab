<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Falling Letters</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; touch-action: none; }
    #ui {
      width: 100%;
      max-width: 400px;
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      color: #eee;
      font-size: 1rem;
    }
    #ui span strong { color: #e94560; }
    #input-row {
      width: 100%;
      max-width: 400px;
      padding: 8px 16px;
      display: flex;
      gap: 8px;
    }
    #answer {
      flex: 1;
      padding: 12px 16px;
      font-size: 1.2rem;
      background: #0f3460;
      border: 2px solid #1a4a80;
      border-radius: 8px;
      color: #fff;
      outline: none;
      font-family: inherit;
    }
    #answer:focus { border-color: #e94560; }
    #submit {
      padding: 12px 20px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    #game-over {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,26,46,0.93);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      color: #eee;
      text-align: center;
    }
    #game-over.show { display: flex; }
    #game-over h2 { font-size: 2rem; color: #e94560; }
    #game-over p { color: #aaa; }
    #game-over button {
      background: #e94560; color: white; border: none;
      padding: 14px 36px; font-size: 1rem; border-radius: 8px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="ui">
    <span>Score: <strong id="score">0</strong></span>
    <span>Lives: <strong id="lives">❤️❤️❤️</strong></span>
    <span>Level: <strong id="level">1</strong></span>
  </div>
  <canvas id="canvas"></canvas>
  <div id="input-row">
    <input id="answer" type="text" placeholder="type the sound..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
    <button id="submit">→</button>
  </div>

  <div id="game-over">
    <h2>Game Over</h2>
    <p id="go-score"></p>
    <button onclick="restartGame()">Play again</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script>
  const LETTERS = [
    { letter: "А", sound: "a" }, { letter: "Б", sound: "b" },
    { letter: "В", sound: "v" }, { letter: "Г", sound: "g" },
    { letter: "Д", sound: "d" }, { letter: "Е", sound: "ye" },
    { letter: "Ж", sound: "zh" }, { letter: "З", sound: "z" },
    { letter: "И", sound: "ee" }, { letter: "К", sound: "k" },
    { letter: "Л", sound: "l" }, { letter: "М", sound: "m" },
    { letter: "Н", sound: "n" }, { letter: "О", sound: "o" },
    { letter: "П", sound: "p" }, { letter: "Р", sound: "r" },
    { letter: "С", sound: "s" }, { letter: "Т", sound: "t" },
    { letter: "У", sound: "oo" }, { letter: "Ф", sound: "f" },
    { letter: "Х", sound: "kh" }, { letter: "Ч", sound: "ch" },
    { letter: "Ш", sound: "sh" }, { letter: "Э", sound: "e" },
    { letter: "Ю", sound: "yu" }, { letter: "Я", sound: "ya" },
  ];

  let fallingLetters = [];
  let score = 0;
  let lives = 3;
  let level = 1;
  let frameCount = 0;
  let gameActive = true;

  function spawnInterval() { return Math.max(60, 130 - level * 10); }
  function fallSpeed() { return 0.8 + level * 0.3; }

  function spawnLetter(p) {
    const data = LETTERS[Math.floor(Math.random() * LETTERS.length)];
    fallingLetters.push({
      letter: data.letter,
      sound: data.sound,
      x: 30 + Math.random() * (p.width - 60),
      y: -30,
      speed: fallSpeed(),
      flash: 0,
    });
  }

  function getCanvas() {
    const w = Math.min(window.innerWidth, 400);
    const h = Math.min(window.innerHeight - 140, 520);
    return { w, h };
  }

  new p5(function(p) {
    p.setup = function() {
      const { w, h } = getCanvas();
      const cnv = p.createCanvas(w, h);
      cnv.parent('canvas');
      p.textAlign(p.CENTER, p.CENTER);
      p.noStroke();
    };

    p.draw = function() {
      if (!gameActive) return;
      p.background(26, 26, 46);
      frameCount++;

      if (frameCount % spawnInterval() === 0) spawnLetter(p);

      for (let i = fallingLetters.length - 1; i >= 0; i--) {
        const fl = fallingLetters[i];
        fl.y += fl.speed;

        // Flash effect on correct answer
        if (fl.flash > 0) {
          p.fill(46, 204, 113, fl.flash * 4);
          p.ellipse(fl.x, fl.y, 70, 70);
          fl.flash -= 5;
        }

        // Draw letter
        p.fill(fl.flash > 0 ? p.color(46, 204, 113) : p.color(255));
        p.textSize(50);
        p.text(fl.letter, fl.x, fl.y);

        // Draw sound hint faintly below
        p.fill(100, 120, 180, 160);
        p.textSize(14);
        p.text(fl.sound, fl.x, fl.y + 34);

        // Reached bottom
        if (fl.y > p.height + 30) {
          fallingLetters.splice(i, 1);
          loseLife();
        }
      }

      // Level up every 10 points
      const newLevel = Math.floor(score / 10) + 1;
      if (newLevel !== level) {
        level = newLevel;
        document.getElementById('level').textContent = level;
      }
    };
  });

  function checkAnswer() {
    if (!gameActive) return;
    const input = document.getElementById('answer');
    const typed = input.value.trim().toLowerCase();
    if (!typed) return;

    let hit = false;
    for (let i = fallingLetters.length - 1; i >= 0; i--) {
      if (fallingLetters[i].sound === typed) {
        fallingLetters[i].flash = 25;
        setTimeout(() => fallingLetters.splice(fallingLetters.indexOf(fallingLetters[i]), 1), 250);
        score++;
        document.getElementById('score').textContent = score;
        hit = true;
        break;
      }
    }
    input.value = '';
    if (!hit) {
      input.style.borderColor = '#e74c3c';
      setTimeout(() => input.style.borderColor = '#1a4a80', 300);
    }
  }

  function loseLife() {
    lives--;
    const hearts = ['❤️'.repeat(lives), '🖤'.repeat(3 - lives)].join('');
    document.getElementById('lives').textContent = hearts || '💔';
    if (lives <= 0) endGame();
  }

  function endGame() {
    gameActive = false;
    document.getElementById('go-score').textContent = `You scored ${score} point${score !== 1 ? 's' : ''}`;
    document.getElementById('game-over').classList.add('show');
  }

  function restartGame() {
    fallingLetters = [];
    score = 0; lives = 3; level = 1; frameCount = 0; gameActive = true;
    document.getElementById('score').textContent = 0;
    document.getElementById('lives').textContent = '❤️❤️❤️';
    document.getElementById('level').textContent = 1;
    document.getElementById('game-over').classList.remove('show');
  }

  document.getElementById('answer').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkAnswer();
  });
  document.getElementById('submit').addEventListener('click', checkAnswer);
  </script>
</body>
</html>
