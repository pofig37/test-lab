    <line x1="38" y1="47" x2="20" y2="60" stroke="#5c3a1e" stroke-width="6"/>
    <line x1="46" y1="48" x2="58" y2="68" stroke="#5c3a1e" stroke-width="6"/>
    <line x1="60" y1="47" x2="48" y2="68" stroke="#5c3a1e" stroke-width="6"/>
    <line x1="70" y1="46" x2="88" y2="58" stroke="#5c3a1e" stroke-width="6"/>
  </g>
  <!-- Frame 3: legs crossing under body -->
  <g transform="translate(200,0)">
    <ellipse cx="50" cy="38" rx="26" ry="13" fill="#8B5A2B"/>
    <path d="M72,30 L88,18 L92,26 L80,36 Z" fill="#8B5A2B"/>
    <circle cx="90" cy="20" r="6" fill="#8B5A2B"/>
    <path d="M28,28 Q14,34 20,50" stroke="#3a2415" stroke-width="4" fill="none"/>
    <line x1="42" y1="49" x2="48" y2="67" stroke="#5c3a1e" stroke-width="6"/>
    <line x1="50" y1="49" x2="56" y2="67" stroke="#5c3a1e" stroke-width="6"/>
    <line x1="58" y1="49" x2="52" y2="67" stroke="#5c3a1e" stroke-width="6"/>
    <line x1="66" y1="48" x2="60" y2="67" stroke="#5c3a1e" stroke-width="6"/>
  </g>
  <!-- Frame 4: airborne suspension, legs tucked -->
  <g transform="translate(300,-6)">
    <ellipse cx="50" cy="36" rx="26" ry="13" fill="#8B5A2B"/>
    <path d="M72,26 L88,10 L93,18 L80,32 Z" fill="#8B5A2B"/>
    <circle cx="90" cy="13" r="6" fill="#8B5A2B"/>
    <path d="M28,24 Q10,20 8,32" stroke="#3a2415" stroke-width="4" fill="none"/>
    <line x1="40" y1="46" x2="34" y2="56" stroke="#5c3a1e" stroke-width="6"/>
    <line x1="48" y1="47" x2="42" y2="57" stroke="#5c3a1e" stroke-width="6"/>
    <line x1="60" y1="46" x2="66" y2="56" stroke="#5c3a1e" stroke-width="6"/>
    <line x1="68" y1="45" x2="74" y2="55" stroke="#5c3a1e" stroke-width="6"/>
  </g>
</svg>
