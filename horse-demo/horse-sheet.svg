<svg xmlns="http://www.w3.org/2000/svg" width="400" height="80" viewBox="0 0 400 80">
  <!-- Frame 1: legs gathered, front pair forward -->
  <g transform="translate(0,0)">
    <ellipse cx="50" cy="38" rx="26" ry="13" fill="#8B5A2B"/>
    <path d="M72,30 L88,18 L92,26 L80,36 Z" fill="#8B5A2B"/>
    <circle cx="90" cy="20" r="6" fill="#8B5A2B"/>
    <path d="M28,28 Q14,34 20,50" stroke="#3a2415" stroke-width="4" fill="none"/>
    <line x1="40" y1="48" x2="34" y2="66" stroke="#5c3a1e" stroke-width="6"/>
    <line x1="48" y1="49" x2="44" y2="66" stroke="#5c3a1e" stroke-width="6"/>
    <line x1="60" y1="49" x2="64" y2="66" stroke="#5c3a1e" stroke-width="6"/>
    <line x1="68" y1="48" x2="74" y2="66" stroke="#5c3a1e" stroke-width="6"/>
  </g>
  <!-- Frame 2: full stride, legs extended -->
  <g transform="translate(100,0)">
    <ellipse cx="50" cy="36" rx="26" ry="13" fill="#8B5A2B"/>
    <path d="M72,28 L90,14 L94,22 L80,34 Z" fill="#8B5A2B"/>
