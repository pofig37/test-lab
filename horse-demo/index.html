<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Horse Sprite Demo</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    background: #cdeafe;
    font-family: sans-serif;
    gap: 1rem;
  }
  h1 { font-size: 1.2rem; color: #333; }
  .stage {
    width: 100%;
    max-width: 500px;
    height: 200px;
    background: #7ec850;
    border-radius: 0.5rem;
    overflow: hidden;
    position: relative;
  }
  .horse {
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: 100px;
    height: 80px;
    background-image: url("horse-sheet.svg");
    background-size: 400px 80px;
    background-position: 0 0;
    image-rendering: pixelated;
    animation:
      run-frames 0.6s steps(4) infinite,
      run-move 4s linear infinite;
  }
  @keyframes run-frames {
    from { background-position: 0 0; }
    to   { background-position: -400px 0; }
  }
  @keyframes run-move {
    from { left: -100px; }
    to   { left: 100%; }
  }
</style>
</head>
<body>
  <h1>Sprite-sheet horse — 4 frames cycling</h1>
  <div class="stage">
    <div class="horse"></div>
  </div>
</body>
</html>
