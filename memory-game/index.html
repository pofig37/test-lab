<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Russian Memory Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1 {
      font-size: 1.6rem;
      color: #e94560;
      margin-bottom: 6px;
      text-align: center;
    }
    .subtitle {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 20px;
      text-align: center;
    }

    .stats {
      display: flex;
      gap: 32px;
      margin-bottom: 20px;
      font-size: 0.95rem;
      color: #aaa;
    }
    .stats span strong { color: #eee; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 400px;
      width: 100%;
    }

    .card {
      aspect-ratio: 3/4;
      perspective: 600px;
      cursor: pointer;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.35s ease;
      border-radius: 10px;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%; height: 100%;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-back {
      background: #0f3460;
      font-size: 1.6rem;
      color: #1a4a80;
      border: 2px solid #1a4a80;
      user-select: none;
    }
    .card-back::after { content: "?"; color: #2a5a90; font-size: 1.8rem; font-weight: bold; }

    .card-front {
      background: #16213e;
      transform: rotateY(180deg);
      border: 2px solid #0f3460;
      font-size: 1.5rem;
      font-weight: bold;
      color: #fff;
    }

    .card.letter .card-front {
      font-size: 2rem;
      color: #e94560;
    }

    .card.matched .card-front {
      background: #1a5c3a;
      border-color: #2ecc71;
      color: #2ecc71;
    }
    .card.matched { cursor: default; }

    .card.shake .card-inner {
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      25% { transform: rotateY(180deg) translateX(-6px); }
      75% { transform: rotateY(180deg) translateX(6px); }
    }

    /* Win screen */
    #win-screen {
      display: none;
      text-align: center;
      position: fixed;
      inset: 0;
      background: rgba(26,26,46,0.92);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
    }
    #win-screen.show { display: flex; }
    #win-screen h2 { font-size: 2.2rem; color: #2ecc71; }
    #win-screen p { color: #aaa; font-size: 1rem; }
    #win-screen button {
      background: #e94560;
      color: white;
      border: none;
      padding: 14px 40px;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
    }
    #win-screen button:hover { background: #c73652; }

    .new-game-btn {
      margin-top: 20px;
      background: transparent;
      color: #888;
      border: 1px solid #333;
      padding: 8px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: color .2s, border-color .2s;
    }
    .new-game-btn:hover { color: #eee; border-color: #666; }
  </style>
</head>
<body>
  <h1>Russian Memory Game</h1>
  <p class="subtitle">Match each letter to its sound</p>

  <div class="stats">
    <span>Moves: <strong id="moves">0</strong></span>
    <span>Time: <strong id="timer">0:00</strong></span>
    <span>Pairs: <strong id="pairs">0 / 8</strong></span>
  </div>

  <div class="grid" id="grid"></div>
  <button class="new-game-btn" onclick="newGame()">New game</button>

  <div id="win-screen">
    <h2>You got it! 🎉</h2>
    <p id="win-stats"></p>
    <button onclick="newGame()">Play again</button>
  </div>

  <script>
  const ALL_LETTERS = [
    { letter: "А", sound: "a" },
    { letter: "Б", sound: "b" },
    { letter: "В", sound: "v" },
    { letter: "Г", sound: "g" },
    { letter: "Д", sound: "d" },
    { letter: "Е", sound: "ye" },
    { letter: "Ж", sound: "zh" },
    { letter: "З", sound: "z" },
    { letter: "И", sound: "ee" },
    { letter: "К", sound: "k" },
    { letter: "Л", sound: "l" },
    { letter: "М", sound: "m" },
    { letter: "Н", sound: "n" },
    { letter: "О", sound: "o" },
    { letter: "П", sound: "p" },
    { letter: "Р", sound: "r" },
    { letter: "С", sound: "s" },
    { letter: "Т", sound: "t" },
    { letter: "У", sound: "oo" },
    { letter: "Ф", sound: "f" },
    { letter: "Х", sound: "kh" },
    { letter: "Ч", sound: "ch" },
    { letter: "Ш", sound: "sh" },
    { letter: "Э", sound: "e" },
    { letter: "Ю", sound: "yu" },
    { letter: "Я", sound: "ya" },
  ];

  const PAIRS = 8;

  let cards = [];
  let flipped = [];
  let matched = 0;
  let moves = 0;
  let locked = false;
  let timerInterval = null;
  let seconds = 0;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function newGame() {
    clearInterval(timerInterval);
    seconds = 0;
    moves = 0;
    matched = 0;
    flipped = [];
    locked = false;

    document.getElementById('moves').textContent = 0;
    document.getElementById('timer').textContent = '0:00';
    document.getElementById('pairs').textContent = `0 / ${PAIRS}`;
    document.getElementById('win-screen').classList.remove('show');

    const chosen = shuffle(ALL_LETTERS).slice(0, PAIRS);
    cards = shuffle([
      ...chosen.map(p => ({ id: p.letter, display: p.letter, type: 'letter', pairId: p.letter })),
      ...chosen.map(p => ({ id: p.sound, display: p.sound, type: 'sound', pairId: p.letter })),
    ]);

    renderGrid();
    startTimer();
  }

  function startTimer() {
    timerInterval = setInterval(() => {
      seconds++;
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    }, 1000);
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    cards.forEach((card, i) => {
      const el = document.createElement('div');
      el.className = `card ${card.type}`;
      el.dataset.index = i;
      el.innerHTML = `
        <div class="card-inner">
          <div class="card-back"></div>
          <div class="card-front">${card.display}</div>
        </div>`;
      el.addEventListener('click', () => handleFlip(el, i));
      grid.appendChild(el);
    });
  }

  function handleFlip(el, index) {
    if (locked) return;
    if (el.classList.contains('flipped') || el.classList.contains('matched')) return;

    el.classList.add('flipped');
    flipped.push({ el, index });

    if (flipped.length === 2) {
      locked = true;
      moves++;
      document.getElementById('moves').textContent = moves;
      checkMatch();
    }
  }

  function checkMatch() {
    const [a, b] = flipped;
    const ca = cards[a.index];
    const cb = cards[b.index];

    if (ca.pairId === cb.pairId && ca.type !== cb.type) {
      a.el.classList.add('matched');
      b.el.classList.add('matched');
      matched++;
      document.getElementById('pairs').textContent = `${matched} / ${PAIRS}`;
      flipped = [];
      locked = false;
      if (matched === PAIRS) setTimeout(showWin, 400);
    } else {
      setTimeout(() => {
        a.el.classList.add('shake');
        b.el.classList.add('shake');
        setTimeout(() => {
          a.el.classList.remove('flipped', 'shake');
          b.el.classList.remove('flipped', 'shake');
          flipped = [];
          locked = false;
        }, 400);
      }, 600);
    }
  }

  function showWin() {
    clearInterval(timerInterval);
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    document.getElementById('win-stats').textContent =
      `${moves} moves · ${m}:${s.toString().padStart(2,'0')}`;
    document.getElementById('win-screen').classList.add('show');
  }

  newGame();
  </script>
</body>
</html>
